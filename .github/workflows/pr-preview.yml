name: PR Preview Docs

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  preview-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build docs preview
        run: |
          set -euo pipefail
          cargo run -p nanoss-cli -- build \
            --content-dir docs \
            --template-dir docs/templates \
            --output-dir docs-preview \
            --include-drafts
      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview-${{ github.event.pull_request.number }}
          path: docs-preview
      - name: Comment preview instructions
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Docs preview artifact has been uploaded for this PR.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "Download artifact: docs-preview-" + context.payload.pull_request.number
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
